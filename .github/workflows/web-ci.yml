# ============================================================================
# web-ci — pull-request gate for the zakuzaku-web Next.js app (web/).
#
# Lints, type-checks and builds the app with pnpm. No GCP, no deploy, no
# secrets: the build runs with DUMMY NEXT_PUBLIC_* values so it succeeds for
# fork PRs and without any repository secrets/variables configured.
# ============================================================================
name: web-ci

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-ci.yml"

# Cancel superseded runs on the same PR branch.
concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (dummy public env)
        run: pnpm run build
        env:
          # Build-time-only placeholders so "next build" succeeds without real
          # Firebase/OAuth config. These never reach a deployed artifact.
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
          NEXT_PUBLIC_GITHUB_OAUTH_CLIENT_ID: ci-dummy-client-id
          NEXT_TELEMETRY_DISABLED: "1"
