name: RunThunder Release

# Builds the RunThunder macOS menu-bar app (Swift Package Manager) in release mode,
# packages the binary into a tarball, attaches it to the GitHub Release, and refreshes
# the Homebrew formula so users can `brew install runthunder`.
#
# Triggers:
#   - release: published   -> normal flow, the published release's tag is used.
#   - workflow_dispatch    -> manual run; pass an existing tag via the `tag` input.
#
# Required secrets:
#   - GITHUB_TOKEN        : built-in, used to upload the release asset (no setup needed).
#   - HOMEBREW_TAP_TOKEN  : a Personal Access Token (classic) with `repo` scope on the
#                           tap repo a-company-jp/homebrew-tap. Used to push the updated
#                           Formula/runthunder.rb to that repo. Create it in the tap repo
#                           (or org) settings and add it as a repo secret here named
#                           HOMEBREW_TAP_TOKEN.
#                           If this secret is absent, the tap-push step is skipped and the
#                           formula committed in THIS repo under Formula/runthunder.rb is
#                           the fallback (users can `brew install --formula ./Formula/runthunder.rb`).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & publish (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, package & publish RunThunder
    runs-on: macos-14
    env:
      # Owner/name of the external Homebrew tap repo.
      TAP_REPO: a-company-jp/homebrew-tap
      # Owner/name of THIS repo (where releases live).
      RELEASE_REPO: a-company-jp/oh-my-blackthunder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve version / tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # release event: github.ref_name is the tag, github.event.release.tag_name is canonical.
            TAG="${{ github.event.release.tag_name }}"
            if [ -z "$TAG" ]; then
              TAG="${{ github.ref_name }}"
            fi
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine release tag."
            exit 1
          fi
          # Strip a leading 'v' for the Homebrew version string (e.g. v1.2.3 -> 1.2.3).
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release --package-path RunThunder
          ls -la RunThunder/.build/release/RunThunder
          file RunThunder/.build/release/RunThunder

      - name: Package tarball + sha256
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TARBALL="RunThunder-${VERSION}-macos.tar.gz"
          STAGE="$(mktemp -d)"
          cp RunThunder/.build/release/RunThunder "$STAGE/RunThunder"
          # Create a flat tarball whose only entry is the executable "RunThunder".
          tar -czf "$TARBALL" -C "$STAGE" RunThunder
          SHA256="$(shasum -a 256 "$TARBALL" | awk '{print $1}')"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Built $TARBALL"
          echo "sha256=$SHA256"

      - name: Upload tarball to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ steps.pkg.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render Homebrew formula
        id: formula
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          TARBALL="${{ steps.pkg.outputs.tarball }}"
          SHA256="${{ steps.pkg.outputs.sha256 }}"
          URL="https://github.com/${RELEASE_REPO}/releases/download/${TAG}/${TARBALL}"

          mkdir -p Formula
          cat > Formula/runthunder.rb <<RUBY
          # typed: false
          # frozen_string_literal: true

          # RunThunder Homebrew formula.
          # This file is regenerated on each release by
          # .github/workflows/runthunder-release.yml — do not edit url/sha256 by hand.
          class Runthunder < Formula
            desc "RunCat-style macOS menu-bar app with a Black Thunder character (CPU/MEM/NET, Claude usage)"
            homepage "https://github.com/a-company-jp/oh-my-blackthunder"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"

            depends_on :macos

            def install
              bin.install "RunThunder"
            end

            def caveats
              <<~EOS
                RunThunder is a menu-bar (LSUIElement) app. Launch it from the binary:

                  runthunder

                It lives in the macOS menu bar (no Dock icon). To run it at login,
                use the app's own "ログイン時に起動" (Launch at Login) toggle, or add
                \$(brew --prefix)/bin/runthunder to your login items.
              EOS
            end

            test do
              assert_predicate bin/"RunThunder", :executable?
            end
          end
          RUBY

          echo "Rendered Formula/runthunder.rb:"
          cat Formula/runthunder.rb

      - name: Push formula to the Homebrew tap
        if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          WORK="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" "$WORK"
          mkdir -p "$WORK/Formula"
          cp Formula/runthunder.rb "$WORK/Formula/runthunder.rb"
          cd "$WORK"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/runthunder.rb
          if git diff --cached --quiet; then
            echo "No formula changes to push."
          else
            git commit -m "runthunder ${VERSION}"
            git push origin HEAD
            echo "Pushed runthunder ${VERSION} to ${TAP_REPO}."
          fi

      - name: Note when tap token is missing
        if: ${{ secrets.HOMEBREW_TAP_TOKEN == '' }}
        shell: bash
        run: |
          echo "::warning::HOMEBREW_TAP_TOKEN is not set — skipped pushing to ${TAP_REPO}."
          echo "Add a PAT with 'repo' scope on the tap as the HOMEBREW_TAP_TOKEN secret to enable tap updates."
          echo "Fallback: the formula in this repo (Formula/runthunder.rb) can be installed with:"
          echo "  brew install --formula ./Formula/runthunder.rb"
